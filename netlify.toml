# Netlify config for Next.js
# Push this repo → Netlify → Add site → Import from Git. Netlify will detect Next.js and use its Next.js runtime.

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

# Note: Security headers and X-Robots-Tag live in next.config.ts `headers()`,
# not here. Netlify [[headers]] rules don't apply to Next.js SSR/ISR routes
# served by the Next.js runtime, so they must be set in Next.js config instead.
