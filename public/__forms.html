<!doctype html>
<html>
  <head>
    <title>Netlify form definitions</title>
  </head>
  <body>
    <!--
      This file exists so Netlify's build-time form parser knows which
      form-name values to accept. The real forms live in React and POST
      to Supabase first (dashboard source of truth) then POST a copy here
      via lib/notifyNetlify.ts so Netlify can email Annette.

      Field lists are intentionally MINIMAL — the dashboard holds the
      full submission; this stub only needs whatever should appear in
      Annette's email notification.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="type" />
      <textarea name="message"></textarea>
    </form>
    <form name="hope-house-application" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="tel" name="cellPhone" />
      <input type="text" name="projectedReleaseDate" />
      <textarea name="mainGoal"></textarea>
    </form>
    <form name="testimonial-submission" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="submitterName" />
      <input type="text" name="relationship" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="quote"></textarea>
      <input type="text" name="consentToPublish" />
      <input type="text" name="consentToUseName" />
      <input type="text" name="source" />
    </form>
  </body>
</html>
